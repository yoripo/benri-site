<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>べんりツール</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f5f5f0;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #2c2c2c;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    header span {
      font-size: 0.8rem;
      color: #aaa;
    }

    nav {
      background: #fff;
      border-bottom: 2px solid #e0e0e0;
      padding: 0 24px;
      display: flex;
      gap: 0;
      overflow-x: auto;
    }

    nav a {
      display: block;
      padding: 12px 20px;
      text-decoration: none;
      color: #555;
      font-size: 0.9rem;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }

    nav a.active, nav a:hover {
      color: #e05a00;
      border-bottom-color: #e05a00;
    }

    main {
      max-width: 800px;
      margin: 32px auto;
      padding: 0 16px;
    }

    .tool-card {
      background: #fff;
      border-radius: 8px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .tool-card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid #f0f0f0;
      color: #222;
    }

    .tool-card h2::before {
      content: "▍";
      color: #e05a00;
      margin-right: 8px;
    }

    .form-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    label {
      font-size: 0.9rem;
      color: #555;
      min-width: 80px;
    }

    input[type="date"],
    input[type="number"],
    select {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 0.95rem;
      color: #333;
      background: #fafafa;
      transition: border-color 0.2s;
    }

    input[type="date"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: #e05a00;
      background: #fff;
    }

    input[type="number"] {
      width: 100px;
    }

    .btn {
      background: #e05a00;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 9px 24px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #c04d00;
    }

    .result-box {
      margin-top: 20px;
      background: #fff8f4;
      border: 1px solid #ffd6b8;
      border-radius: 6px;
      padding: 16px 20px;
      font-size: 1rem;
      color: #333;
      display: none;
    }

    .result-box.show {
      display: block;
    }

    .result-box .result-main {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e05a00;
      margin-bottom: 4px;
    }

    .result-box .result-sub {
      font-size: 0.85rem;
      color: #888;
    }

    .divider {
      margin: 16px 0;
      border: none;
      border-top: 1px solid #f0f0f0;
    }

    footer {
      text-align: center;
      padding: 32px;
      color: #aaa;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

<header>
  <h1>べんりツール</h1>
  <span>シンプルな日本語ユーティリティ集</span>
</header>

<nav>
  <a href="index.html" class="active">日付計算</a>
  <a href="wareki.html">和暦西暦</a>
  <a href="#">年齢計算</a>
  <a href="#">単位変換</a>
  <a href="#">文字数カウント</a>
</nav>

<main>

  <!-- 日付計算1: 今日からN日後 -->
  <div class="tool-card">
    <h2>今日から〇日後は何日？</h2>
    <div class="form-row">
      <label>基準日</label>
      <input type="date" id="baseDate">
      <button class="btn" onclick="setToday()">今日</button>
    </div>
    <div class="form-row">
      <label>日数</label>
      <input type="number" id="daysInput" placeholder="例: 30" min="-3650" max="3650">
      <span style="color:#888; font-size:0.9rem">日後（マイナスで前）</span>
    </div>
    <button class="btn" onclick="calcFutureDate()">計算する</button>

    <div class="result-box" id="result1">
      <div class="result-main" id="result1-main"></div>
      <div class="result-sub" id="result1-sub"></div>
    </div>
  </div>

  <!-- 日付計算2: 2つの日付の間の日数 -->
  <div class="tool-card">
    <h2>2つの日付の間の日数</h2>
    <div class="form-row">
      <label>開始日</label>
      <input type="date" id="startDate">
    </div>
    <div class="form-row">
      <label>終了日</label>
      <input type="date" id="endDate">
    </div>
    <button class="btn" onclick="calcDiff()">計算する</button>

    <div class="result-box" id="result2">
      <div class="result-main" id="result2-main"></div>
      <div class="result-sub" id="result2-sub"></div>
    </div>
  </div>

</main>

<footer>
  べんりツール &copy; 2025
</footer>

<script>
  // 曜日の日本語表記
  const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];

  // 日付をフォーマット: YYYY年MM月DD日（曜日）
  function formatDate(date) {
    const y = date.getFullYear();
    const m = date.getMonth() + 1;
    const d = date.getDate();
    const w = WEEKDAYS[date.getDay()];
    return `${y}年${m}月${d}日（${w}）`;
  }

  // 今日の日付をinputにセット
  function setToday() {
    const today = new Date();
    const iso = today.toISOString().split('T')[0];
    document.getElementById('baseDate').value = iso;
  }

  // ページ読み込み時に今日をセット
  window.onload = () => {
    setToday();
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('startDate').value = today;
    document.getElementById('endDate').value = today;
  };

  // 今日からN日後を計算
  function calcFutureDate() {
    const baseDateVal = document.getElementById('baseDate').value;
    const days = parseInt(document.getElementById('daysInput').value);

    if (!baseDateVal || isNaN(days)) {
      alert('基準日と日数を入力してください');
      return;
    }

    const base = new Date(baseDateVal);
    const target = new Date(base);
    target.setDate(base.getDate() + days);

    const label = days >= 0 ? `${days}日後` : `${Math.abs(days)}日前`;
    const resultMain = document.getElementById('result1-main');
    const resultSub = document.getElementById('result1-sub');
    const resultBox = document.getElementById('result1');

    resultMain.textContent = formatDate(target);
    resultSub.textContent = `${formatDate(base)} の ${label}`;
    resultBox.classList.add('show');
  }

  // 2日付間の日数差を計算
  function calcDiff() {
    const startVal = document.getElementById('startDate').value;
    const endVal = document.getElementById('endDate').value;

    if (!startVal || !endVal) {
      alert('開始日と終了日を入力してください');
      return;
    }

    const start = new Date(startVal);
    const end = new Date(endVal);
    const diffMs = end - start;
    const diffDays = Math.round(diffMs / (1000 * 60 * 60 * 24));

    const resultMain = document.getElementById('result2-main');
    const resultSub = document.getElementById('result2-sub');
    const resultBox = document.getElementById('result2');

    if (diffDays === 0) {
      resultMain.textContent = '同じ日付です';
      resultSub.textContent = '';
    } else if (diffDays > 0) {
      resultMain.textContent = `${diffDays}日間`;
      resultSub.textContent = `${formatDate(start)} から ${formatDate(end)} まで`;
    } else {
      resultMain.textContent = `${Math.abs(diffDays)}日間（逆順）`;
      resultSub.textContent = `終了日が開始日より前になっています`;
    }
    resultBox.classList.add('show');
  }

  // Enterキーでも計算できるように
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      if (document.activeElement.closest('.tool-card')) {
        const card = document.activeElement.closest('.tool-card');
        card.querySelector('.btn:last-of-type').click();
      }
    }
  });
</script>

</body>
</html>
